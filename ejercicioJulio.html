<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CSS Buttons</title>
  <link rel="stylesheet" href="ejercicioJulio.css">
</head>
<body>

<h1>Ejercicio</h1>

<div class="container">

  <div class="left">

    <div class="card heart-card">
      <div class="heart-top">❤️</div>
      <button class="btn heart">Love this tutorial!</button>
    </div>

    <div class="row">
      <button class="btn simple"><span>Click me!</span></button>
      <button class="btn simple"><span>Click me!</span></button>
    </div>

    <div class="row">
      <button class="btn arrow"><span>Click me!</span></button>
      <button class="btn number"><span>Click me!</span></button>
    </div>

  </div>

  <div class="right">
    <h2>CSS BUTTONS</h2>
    <p>WITH PSEUDO-ELEMENTS</p>
  </div>

</div>

</body>
</html>
