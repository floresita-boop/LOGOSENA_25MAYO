<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inputs con Shadow</title>
    <link rel="stylesheet" href="shadow.css">
</head>
<body>

<div class="contenedor">

    <input type="text" placeholder="Nombre">
    <input type="email" placeholder="Correo">
    <input type="password" placeholder="Contraseña">
    <input type="text" placeholder="Ciudad">
    <input type="text" placeholder="País">

</div>
<div class="botones">

    <div class="btn">Guardar</div>
    <div class="btn">Editar</div>
    <div class="btn">Eliminar</div>

</div>
<div class="power">⏻</div>
<div class="semaforo">

    <div class="luz rojo"></div>
    <div class="luz amarillo"></div>
    <div class="luz azul"></div>

</div>
<div class="abajo">

    <button class="btn-drop">Botón Glow</button>

    <div class="caja-glow">
        Cajita con luz ✨
    </div>
    <div class="texto-final">
    Florelia ADSO
</div>

</div>
<div class="caja">
    Texto bonito
</div>
<div class="contenedor-img">
    <img src="imagen.jgp.jpg" alt="imagen">
</div>

<div class="caja">
    INSET
</div>

</body>
</html>
