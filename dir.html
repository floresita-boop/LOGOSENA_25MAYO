<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DIR LTR y RTL</title>
    <link rel="stylesheet" href="dir.css">
</head>
<body>

    <h1>Ejemplo de dir="ltr" y dir="rtl"</h1>

    <div class="caja">
        <p class="texto-ltr" dir="ltr">
            Hola, este texto usa dirección LTR.
        </p>
    </div>

    <div class="caja">
        <p class="texto-rtl" dir="rtl">
            مرحبا هذا النص يستخدم اتجاه RTL
        </p>
    </div>

</body>
</html>
