<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pseudoclases CSS</title>
    <link rel="stylesheet" href="pseudoclases.css">
</head>
<body>

    <h1>Ejemplos de Pseudoclases</h1>

    <!-- :hover -->
    <button class="hover-btn">Hover</button>

    <br><br>

    <!-- :active -->
    <button class="active-btn">Active</button>

    <br><br>

    <!-- :focus -->
    <input type="text" class="focus-input" placeholder="Haz clic aquí">

    <br><br>

    <!-- :focus-within -->
    <div class="contenedor">
        <label>Nombre:</label>
        <input type="text" placeholder="Escribe tu nombre">
    </div>

    <br><br>

    <!-- :focus-visible -->
    <button class="visible-btn">Focus Visible</button>

</body>
</html>
