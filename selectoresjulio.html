<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Tech Premium</title>
    <link rel="stylesheet" href="selectoresjulio.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>🚀 Catálogo Tech Premium</h1>
        <p class="subtitle">Explora nuestros productos más destacados</p>
        
        <div class="acciones">
            <a href="#todo" class="btn">⬜ Todos</a>
            <a href="#laptops" class="btn">💻 Laptops</a>
            <a href="#celulares" class="btn">📱 Celulares</a>
            <a href="#audio" class="btn">🎧 Audio</a>
            <a href="#gaming" class="btn">🎮 Gaming</a>
        </div>

        <div id="todo"></div>
        <div id="laptops"></div>
        <div id="celulares"></div>
        <div id="audio"></div>
        <div id="gaming"></div>

        <div class="productos">
            <div class="item laptop"><div class="icon">💻</div> <strong>MacBook Pro</strong><span>Laptop</span></div>
            <div class="item laptop"><div class="icon">💻</div> <strong>Dell XPS</strong><span>Laptop</span></div>
            <div class="item celular"><div class="icon">📱</div> <strong>iPhone 15</strong><span>Celular</span></div>
            <div class="item celular"><div class="icon">📱</div> <strong>Pixel 8</strong><span>Celular</span></div>
            <div class="item audio"><div class="icon">🎧</div> <strong>Sony XM5</strong><span>Audio</span></div>
            <div class="item audio"><div class="icon">🎧</div> <strong>AirPods Pro</strong><span>Audio</span></div>
            <div class="item gaming"><div class="icon">🎮</div> <strong>PS5</strong><span>Gaming</span></div>
        </div>
    </div>
</body>
</html>
