<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro</title>

<link rel="stylesheet" href="selectoresEspecificos.css">

</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <h2 class="sidebar__title">Dashboard</h2>

        <ul class="sidebar__menu">
            <li class="sidebar__item">Inicio</li>
            <li class="sidebar__item">Proyectos</li>
            <li class="sidebar__item">Reportes</li>
            <li class="sidebar__item">Configuración</li>
        </ul>

        <span class="sidebar__version">v2.3.4</span>

    </aside>

    <!-- CONTENIDO -->
    <main class="content">

        <section class="card" data-num="01">
            <h3 class="card__title">Estado del Sistema</h3>
            <span class="card__status card__status--ok">✔ Operacional</span>
            <span class="card__status card__status--alert">3 Alertas</span>
        </section>

        <section class="card" data-num="02">
            <h3 class="card__title">Tareas Pendientes</h3>
        </section>

        <section class="card" data-num="03">
            <h3 class="card__title">Equipo</h3>
        </section>

        <section class="card" data-num="04">
            <h3 class="card__title">Información</h3>
        </section>

    </main>

</div>

</body>
</html>
