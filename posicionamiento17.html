<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Display: inline, block e inline-block</title>
    <link rel="stylesheet" href="posicionamiento17.css">
</head>
<body>

    <h2>Block</h2>
    <div class="block">Caja 1</div>
    <div class="block">Caja 2</div>

    <h2>Inline</h2>
    <div class="inline">Caja 1</div>
    <div class="inline">Caja 2</div>
    <div class="inline">Caja 3</div>

    <h2>Inline-Block</h2>
    <div class="inline-block">Caja 1</div>
    <div class="inline-block">Caja 2</div>
    <div class="inline-block">Caja 3</div>

</body>
</html>
