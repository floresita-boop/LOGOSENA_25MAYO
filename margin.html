<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo de Márgenes</title>
    <link rel="stylesheet" href="margin.css">
</head>
<body>

    <h2>1. margin: auto (Centrado horizontal)</h2>
    <div class="caja-auto">Centrado</div>

    <h2>2. margin-left: 50px (Espacio fijo)</h2>
    <div class="caja-left">Desplazado 50px</div>

    <h2>3. margin-left: auto (Alineado a la derecha)</h2>
    <div class="caja-left-auto">A la derecha</div>

    <h2>4. Botón centrado</h2>
    <button class="mi-boton">¡Haz clic aquí!</button>

</body>
</html>
