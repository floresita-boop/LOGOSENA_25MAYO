<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pro - Edición Clara</title>
    <link rel="stylesheet" href="shadow2.css">
</head>
<body>

    <div class="login-container">
        
        <h2>Sign in empleate</h2>
        <p class="description">Sign in with your username and password</p>

        <form>
            <div class="input-block">
                <label>Your username</label>
                <input type="text" placeholder="Enter Username" required>
            </div>

            <div class="input-block">
                <label>Your password</label>
                <input type="password" placeholder="Enter Password" required>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-submit">Login</button>
        </form>

        <p class="footer-text">Not a member? <a href="#">Register here!</a></p>

    </div>

</body>
</html>
