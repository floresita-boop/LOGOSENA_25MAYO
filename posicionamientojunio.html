<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display y Visibility solo CSS</title>
    <link rel="stylesheet" href="posicionamientojunio.css">
</head>
<body>

<h1>Ocultar elementos con CSS</h1>

<!-- Checkbox ocultos -->
<input type="checkbox" id="toggle2">
<input type="checkbox" id="toggle3">

<!-- Botones (labels) -->
<label for="toggle2" class="boton">Ocultar Caja 2 (display:none)</label>
<label for="toggle3" class="boton">Ocultar Caja 3 (visibility:hidden)</label>

<div class="contenedor">
    <div class="caja azul">Caja 1</div>

    <div class="caja verde caja2">Caja 2</div>

    <div class="caja roja caja3">Caja 3</div>

    <div class="caja naranja">Caja 4</div>
</div>

</body>
</html>
